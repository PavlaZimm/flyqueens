<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE047"/>
      <stop offset="100%" style="stop-color:#EAC820"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- iOS background — zaoblené rohy přes clipPath -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Jemný lesk nahoře -->
  <rect width="1024" height="512" rx="224" ry="224" fill="white" opacity="0.03"/>

  <!-- Letadlo — čistá silueta, zlatá, centrovaná, natočená 45° (vzlétá) -->
  <g transform="translate(512,512) rotate(-35) scale(1.15)" filter="url(#glow)">
    <!-- Trup -->
    <ellipse cx="0" cy="0" rx="38" ry="220" fill="url(#gold)"/>
    <!-- Nos -->
    <ellipse cx="0" cy="-210" rx="28" ry="60" fill="url(#gold)"/>
    <!-- Hlavní křídla -->
    <ellipse cx="0" cy="-20" rx="280" ry="32" fill="url(#gold)" transform="rotate(-2)"/>
    <!-- Zadní křídla (stabilizátory) -->
    <ellipse cx="0" cy="155" rx="130" ry="18" fill="url(#gold)"/>
    <!-- Motor levý -->
    <ellipse cx="-160" cy="10" rx="28" ry="55" fill="url(#gold)"/>
    <!-- Motor pravý -->
    <ellipse cx="160" cy="10" rx="28" ry="55" fill="url(#gold)"/>
  </g>

  <!-- Jemný zlatý záblesk za letadlem -->
  <ellipse cx="430" cy="590" rx="80" ry="20" fill="#FDE047" opacity="0.08" transform="rotate(-35, 430, 590)"/>
</svg>
